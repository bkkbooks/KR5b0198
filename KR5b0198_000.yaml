front:
  text: 玉籙資度晚朝儀
  hash: sha256:5805e192294b2c3cef4718cf46d9e1b496aaf1be4b00afe58edce9c9813221c0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0198_HFL_000-001a, image: hfl/0268/0268-072.png}
body:
  text: 法事如式各禮師存念如法請宣神呪五星高耀瑞氣飛浮元始集神天地交周玉符寳節嘯命微幽擲火揚威奸凶無留萬魔振伏紛葩却消摧怪滅惡道炁周流神光照夜隂翳俱收萬神降格扇景乘飊羣生咸遂惠徧神州和與道合眞鳴法鼓二十四通無上三天玄元始三炁太上道君太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝顯服冠帶垂纓關啓玄壇土地方域神眞臣今晚朝陞壇行道謹奏爲入意其諸忱悃巳錄吿聞願得太上十方至眞道炁靈寳慧光下降流入臣等身中令臣所啓之誠速逹徑御太上無極大道三清上聖昊天金闕玉皇上帝東極慈尊青玄上帝道前請稱法位具位臣姓某與臨壇官衆等謹同誠上啓虚無自然至眞無極大道元始天尊太上道君太上老君高上玉皇上帝紫微北極大帝紫微天皇上帝后土皇地祗東極青華大帝南極長生大帝無上玉帝玉虚上帝太微天帝少微天帝東華南極西靈北眞玄都玉京金闕七寳瓊臺紫微上宮靈寳至眞明皇道君十方巳得道大聖衆至眞諸君丈人大慈大悲救苦眞人救度眞人大惠眞人注生眞人普救眞人香林㑹中法解眞人三十六部尊經玄中大法師三天大法師靈寳經籍度三師眞君正一嗣系女三師君三界官屬一切眞靈恭望洪慈俯垂昭鑒臣聞無色無淵祖炁妙凝於混沌成形成象眞精煥落於洪濛因五大以開圖奠三靈而立極道遵元始光明洞輔之中教演虚皇化育堪輿之表無文不度有感斯通臣等運際明時緣逢慶㑹膺九清之玉牒佩三洞之瓊丈結友雲扃未符高歩承流塵路莫悟玄宗籍師寳之相攜感帝恩之下燭尚寛玄責猶服眞乘惟金科昭賛於仁風度人是切而玉律扶持於化日濟物爲先凡有皈投敢忘關奏臣欽奉綸音崇修玉籙祗薦某靈按如詞言備極昭切庸潔玄壇而闡事恭依玉籙以登齋奉奎璧於十華散金花於五界願垂睿鑒申衍蕃釐敕制地祇有護衞送迎之喜超凌仙界得逍遥快樂之天福利邦家恩沾寰宇以今晚朝陞壇行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至眞道寳臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德資薦某靈恭願神遊紫極汎景玄虚䕃芝蓋以凝眞宻扶聖祚躡蓮臺而縱歩垂䕃本枝今故燒香自皈依師尊大聖衆至眞之德得道之後保天長存和與道合眞以今晚朝陞壇行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至眞經寳臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德資薦某靈恭願進位仙階登眞妙境歩瑶臺而遊宴詣瓊圃以逍遥福果自然形神俱妙䕃宗枝於百世翊寳祚於萬年今故燒香自皈依師尊大聖衆至眞之德得道之後昇入無形和與道合眞以今晚朝陞壇行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至眞師寳臣等皈身皈神皈命首體投地仰依太上三尊十方衆聖願以是香功德資薦某靈恭願慧源昭朗覺海澄清浴神流火之庭雲綱旋躡䕃質明霞之館天歩高躋上及太廟宗祧俱登天位下及臣等三師五友異代學眞靈元觀妙沖漠升眞驂鶴駕於瑶京充悅道味翼鸞輿於紫闕餐聽法音永證無爲長辤有漏九幽靈爽均被甄陶今故燒香自皈依師尊大聖衆至眞之德得道之後永保長存和與道合眞懴悔三禮同前具位臣姓某與臨壇官衆等謹重誠上啓太上無極大道元始天尊太上道君太上老君無上玄老十方巳得道大聖衆至眞諸君丈人三十六部尊經玄中大法師天師君上相上宰上保上傳四司五帝十二卿相三界官屬一切眞靈恭望洪慈洞垂昭鑒臣聞清微布化敷七部以統天赤明開圖鎭五篇而育物萬聖授度生之籙三元啓延景之恩今古承休天人稱慶是以齋崇玉籙爰遵蘂笈之科恩輅青玄式衞芝輪之澤恭願某靈飛玉津於東井澄瀹心華揚金彩於南丹陶鎔性識克登神於紫極永錫佑於皇家上願天圖朗晏地紀安平經緯昭融風雲靜黙五兵偃戢萬邦沐仁夀之風百榖豐盈四海極聖明之治圖書煥瑞文範同疆林壑棲眞克證六通之妙煙霞味道早符萬行之圎冥漠幽沈飛潜動植均被甄陶之澤瓊超輪轉之機一切有情同登道岸則上明天尊大慈之化下副臣等皈命之誠謹啓以聞發願存神燒香香官使者左右龍虎君侍香諸靈官當令臣向來晩朝陞壇行道之所自然生金液丹碧之英百靈衆眞交㑹在此香火鑪前當願誠意感通某靈昇度克證天眞之果普資家國之恩十方仙童玉女接侍蘭煙傳臣向來所啓之誠速逹徑御至眞無極大道三清上聖昊天金闕玉皇上帝東極慈尊青玄上帝道前出堂頌玉籙資度晚朝儀
